keyboards:
  - name: t9注音
    isPrimary: false
    rows:
      - keys:
          - action: { character: { char: "e" } }
            width: { percentage: 0.16 }
            label: { text: "ˉ" }
          - action: { character: { char: "1" } }
            width: { percentage: 0.226 }
            label: { text: "ㄅㄉㄚ" }
            callout:
              - label: "ㄅ"
                action: { character: { char: "b" } }
              - label: "ㄉ"
                action: { character: { char: "d" } }
              - label: "ㄚ"
                action: { character: { char: "a" } }
          - action: { character: { char: "2" } }
            width: { percentage: 0.226 }
            label: { text: "ㄍㄐㄞ" }
            callout:
              - label: "ㄍ"
                action: { character: { char: "g" } }
              - label: "ㄐ"
                action: { character: { char: "j" } }
              - label: "ㄞ"
                action: { character: { char: "A" } }
          - action: { character: { char: "3" } }
            width: { percentage: 0.226 }
            label: { text: "ㄓㄗㄢㄦ" }
            callout:
              # 右側按鍵氣泡向左展開，需反轉定義以維持視覺順序 (ㄓㄗㄢㄦ)
              - label: "ㄦ"
                action: { character: { char: "R" } }
              - label: "ㄢ"
                action: { character: { char: "M" } }
              - label: "ㄗ"
                action: { character: { char: "z" } }
              - label: "ㄓ"
                action: { character: { char: "Z" } }
          - action: { symbol: { char: "=" } }
            width: { percentage: 0.16 }
            label: { text: "=" }
      - keys:
          - action: { character: { char: "w" } }
            width: { percentage: 0.16 }
            label: { text: "ˊ" }
          - action: { character: { char: "4" } }
            width: { percentage: 0.226 }
            label: { text: "ㄆㄊㄛ" }
            callout:
              - label: "ㄆ"
                action: { character: { char: "p" } }
              - label: "ㄊ"
                action: { character: { char: "t" } }
              - label: "ㄛ"
                action: { character: { char: "o" } }
          - action: { character: { char: "5" } }
            width: { percentage: 0.226 }
            label: { text: "ㄎㄑㄟ" }
            callout:
              - label: "ㄎ"
                action: { character: { char: "k" } }
              - label: "ㄑ"
                action: { character: { char: "q" } }
              - label: "ㄟ"
                action: { character: { char: "I" } }
          - action: { character: { char: "6" } }
            width: { percentage: 0.226 }
            label: { text: "ㄔㄘㄣㄧ" }
            callout:
              # 右側按鍵反轉定義 (ㄔㄘㄣㄧ)
              - label: "ㄧ"
                action: { character: { char: "i" } }
              - label: "ㄣ"
                action: { character: { char: "N" } }
              - label: "ㄘ"
                action: { character: { char: "c" } }
              - label: "ㄔ"
                action: { character: { char: "C" } }
          - action: { keyboardType: t9數字 }
            width: { percentage: 0.16 }
            label: { text: "123" }
      - keys:
          - action: { character: { char: "y" } }
            width: { percentage: 0.16 }
            label: { text: "ˇ" }
          - action: { character: { char: "7" } }
            width: { percentage: 0.226 }
            label: { text: "ㄇㄋㄜ" }
            callout:
              - label: "ㄇ"
                action: { character: { char: "m" } }
              - label: "ㄋ"
                action: { character: { char: "n" } }
              - label: "ㄜ"
                action: { character: { char: "e" } }
          - action: { character: { char: "8" } }
            width: { percentage: 0.226 }
            label: { text: "ㄏㄒㄠㄡ" }
            callout:
              - label: "ㄏ"
                action: { character: { char: "h" } }
              - label: "ㄒ"
                action: { character: { char: "x" } }
              - label: "ㄠ"
                action: { character: { char: "O" } }
              - label: "ㄡ"
                action: { character: { char: "U" } }
          - action: { character: { char: "9" } }
            width: { percentage: 0.226 }
            label: { text: "ㄕㄙㄤㄨ" }
            callout:
              # 右側按鍵反轉定義 (ㄕㄙㄤㄨ)
              - label: "ㄨ"
                action: { character: { char: "u" } }
              - label: "ㄤ"
                action: { character: { char: "K" } }
              - label: "ㄙ"
                action: { character: { char: "s" } }
              - label: "ㄕ"
                action: { character: { char: "S" } }
          - action: backspace
            width: { percentage: 0.16 }
            label: { text: "⌫" }
      - keys:
          - action: { character: { char: "q" } }
            width: { percentage: 0.16 }
            label: { text: "ˋ" }
          - action: { character: { char: "0" } }
            width: { percentage: 0.226 }
            label: { text: "ㄈㄌㄝ" }
            callout:
              - label: "ㄈ"
                action: { character: { char: "f" } }
              - label: "ㄌ"
                action: { character: { char: "l" } }
              - label: "ㄝ"
                action: { character: { char: "E" } }
          - action: space
            width: { percentage: 0.226 }
            label: { text: "空白" }
          - action: { character: { char: "v" } }
            width: { percentage: 0.226 }
            label: { text: "ㄖㄥㄩ" }
            callout:
              # 右側按鍵反轉定義 (ㄖㄥㄩ)
              - label: "ㄩ"
                action: { character: { char: "v" } }
              - label: "ㄥ"
                action: { character: { char: "G" } }
              - label: "ㄖ"
                action: { character: { char: "r" } }
          - action: enter
            width: { percentage: 0.16 }
            label: { text: "↵" }
    buttonInsets:
      left: 3
      bottom: 3
      top: 3
      right: 3

  - name: t9數字
    isPrimary: false
    rows:
      - keys:
          - action: { symbol: { char: "+" } }
            width: { percentage: 0.16 }
            label: { text: "+" }
          - action: { symbol: { char: "1" } }
            width: { percentage: 0.226 }
            label: { text: "1" }
          - action: { symbol: { char: "2" } }
            width: { percentage: 0.226 }
            label: { text: "2" }
          - action: { symbol: { char: "3" } }
            width: { percentage: 0.226 }
            label: { text: "3" }
          - action: { symbol: { char: "=" } }
            width: { percentage: 0.16 }
            label: { text: "=" }
      - keys:
          - action: { symbol: { char: "-" } }
            width: { percentage: 0.16 }
            label: { text: "-" }
          - action: { symbol: { char: "4" } }
            width: { percentage: 0.226 }
            label: { text: "4" }
          - action: { symbol: { char: "5" } }
            width: { percentage: 0.226 }
            label: { text: "5" }
          - action: { symbol: { char: "6" } }
            width: { percentage: 0.226 }
            label: { text: "6" }
          - action: { keyboardType: t9注音 }
            width: { percentage: 0.16 }
            label: { text: "中" }
      - keys:
          - action: { symbol: { char: "*" } }
            width: { percentage: 0.16 }
            label: { text: "*" }
          - action: { symbol: { char: "7" } }
            width: { percentage: 0.226 }
            label: { text: "7" }
          - action: { symbol: { char: "8" } }
            width: { percentage: 0.226 }
            label: { text: "8" }
          - action: { symbol: { char: "9" } }
            width: { percentage: 0.226 }
            label: { text: "9" }
          - action: backspace
            width: { percentage: 0.16 }
            label: { text: "⌫" }
      - keys:
          - action: { symbol: { char: "/" } }
            width: { percentage: 0.16 }
            label: { text: "/" }
          - action: { symbol: { char: "," } }
            width: { percentage: 0.226 }
            label: { text: "," }
          - action: { symbol: { char: "0" } }
            width: { percentage: 0.226 }
            label: { text: "0" }
          - action: { symbol: { char: "." } }
            width: { percentage: 0.226 }
            label: { text: "." }
          - action: enter
            width: { percentage: 0.16 }
            label: { text: "↵" }
    buttonInsets:
      left: 3
      bottom: 3
      top: 3
      right: 3
