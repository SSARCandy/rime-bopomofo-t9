    - xform/S/ㄕ/
    - xform/s/ㄙ/
    - xform/f/ㄈ/
    - xform/l/ㄌ/
    - xform/r/ㄖ/
    - xform/i/ㄧ/
    - xform/u/ㄨ/
    - xform/v/ㄩ/
    - xform/a/ㄚ/
