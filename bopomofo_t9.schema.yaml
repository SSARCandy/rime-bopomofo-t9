schema:
  schema_id: bopomofo_t9
  name: 注音九宮格(自訂)
  version: "6.0"

engine:
  processors:
    - ascii_composer
    - speller
    - predictor
    - recognizer
    - key_binder
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - predict_translator
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: "1234567890vwyqpbdgjZzptkCcmnhxSsflreiuEAIOMNKGRA"
  initials: "1234567890vwyqpbdgjZzptkCcmnhxSsflreiuEAIOMNKGRA"
  use_space: false
  delimiter: " '"
  algebra:
    - xform/^r5$/er5/
    - xform/1$/X/
    - xform/2$/W/
    - xform/3$/Y/
    - xform/4$/Q/
    - xform/5$/P/
    - xform/^yu/v/
    - xform/^yi?/i/
    - xform/^wu?/u/
    - xform/iu/iou/
    - xform/ui/uei/
    - xform/ong/ung/
    - xform/ing/iG/
    - xform/ung/uG/
    - xform/iu/v/
    - xform/^([jqx])u/$1v/
    - xform/([iuv])n/$1en/
    - xform/^zhi?/Z/
    - xform/^chi?/C/
    - xform/^shi?/S/
    - xform/^([zcsr])i/$1/
    - xform/ai/A/
    - xform/ei/I/
    - xform/ao/O/
    - xform/ou/U/
    - xform/ang/K/
    - xform/eng/G/
    - xform/an/M/
    - xform/en/N/
    - xform/er/R/
    - xform/eh/E/
    - xform/([iv])e/$1E/
    - derive/a/1/
    - derive/A/2/
    - derive/[MR]/3/
    - derive/o/4/
    - derive/I/5/
    - derive/[Ni]/6/
    - derive/e/7/
    - derive/[OU]/8/
    - derive/[Ku]/9/
    - derive/E/0/
    - derive/[Gv]/v/
    - derive/^b/1/
    - derive/^d/1/
    - derive/^g/2/
    - derive/^j/2/
    - derive/^Z/3/
    - derive/^z/3/
    - derive/^p/4/
    - derive/^t/4/
    - derive/^k/5/
    - derive/^q/5/
    - derive/^C/6/
    - derive/^c/6/
    - derive/^m/7/
    - derive/^n/7/
    - derive/^h/8/
    - derive/^x/8/
    - derive/^S/9/
    - derive/^s/9/
    - derive/^f/0/
    - derive/^l/0/
    - derive/^r/v/
    - xform/W/w/
    - xform/Y/y/
    - xform/Q/q/
    - xform/P/p/
    - xform/X$/e/
    - derive/[wyqpe]$//
    - derive/^(.).+$/$1/
    - derive/^(.).+([wyqp])$/$1$2/

translator:
  dictionary: terra_pinyin
  prism: bopomofo_t9_custom
  preedit_format:
    - xform/(.)e$/$1ˉ/
    - xform/^p/ㄆ/
    - xform/ p/ ㄆ/
    - xform/'p/'ㄆ/
    - xform/p/˙/
    - xform/^q/ㄑ/
    - xform/ q/ ㄑ/
    - xform/'q/'ㄑ/
    - xform/q/ˋ/
    - xform/b/ㄅ/
    - xform/d/ㄉ/
    - xform/g/ㄍ/
    - xform/j/ㄐ/
    - xform/Z/ㄓ/
    - xform/z/ㄗ/
    - xform/t/ㄊ/
    - xform/k/ㄎ/
