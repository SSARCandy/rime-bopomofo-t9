key_binder:
  import_preset: default
  bindings:
    # 這裡是你唯一需要的新功能：按下 Enter 時，把預覽的注音直接送出去
    - { when: composing, accept: Return, send: Shift+Return }

recognizer:
  import_preset: default
  patterns:
    abc: "^[a-zA-Z0-9]+$"

predictor:
  db: predict.db
  max_candidates: 5
  max_iterations: 1

simplifier:
  opencc_config: s2t.json
