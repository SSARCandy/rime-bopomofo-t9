schema:
  schema_id: bopomofo_t9
  name: 注音九宮格(自訂)
  version: "6.0"

engine:
  processors:
    - ascii_composer
    - speller
    - predictor
    - recognizer
    - key_binder
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - predict_translator
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier

speller:
  # T9數字鍵 + 聲調鍵 + 所有注音精確碼(ASCII字母)
  # 精確碼表:
  # 聲母: b(ㄅ) p(ㄆ) m(ㄇ) f(ㄈ) d(ㄉ) t(ㄊ) n(ㄋ) l(ㄌ) g(ㄍ) k(ㄎ) h(ㄏ) j(ㄐ) q(ㄑ) x(ㄒ) Z(ㄓ) C(ㄔ) S(ㄕ) r(ㄖ) z(ㄗ) c(ㄘ) s(ㄙ)
  # 介母: i(ㄧ) u(ㄨ) v(ㄩ)
  # 韻母: a(ㄚ) o(ㄛ) e(ㄜ) E(ㄝ) A(ㄞ) I(ㄟ) O(ㄠ) U(ㄡ) M(ㄢ) N(ㄣ) K(ㄤ) G(ㄥ) R(ㄦ)
  # 聲調: e(1) w(2) y(3) q(4) p(5)
  alphabet: "1234567890vwyqpbdgjZzptkCcmnhxSsflreiuEAIOMNKGRA"
  initials: "1234567890vwyqpbdgjZzptkCcmnhxSsflreiuEAIOMNKGRA"
  use_space: false
  delimiter: " '"
  algebra:
    - xform/^r5$/er5/

    # 聲調預處理 (一聲用臨時標記 X 保留)
    - xform/1$/X/
    - xform/2$/W/
    - xform/3$/Y/
    - xform/4$/Q/
    - xform/5$/P/

    # 介母
    - xform/^yu/v/
    - xform/^yi?/i/
    - xform/^wu?/u/

    # 拼音修正
    - xform/iu/iou/
    - xform/ui/uei/
    - xform/ong/ung/
    - xform/ing/iG/
    - xform/ung/uG/
    - xform/iu/v/
    - xform/^([jqx])u/$1v/
    - xform/([iuv])n/$1en/

    # 聲母特殊處理(保留大寫作為精確碼)
    - xform/^zhi?/Z/
    - xform/^chi?/C/
    - xform/^shi?/S/
    - xform/^([zcsr])i/$1/

    # 韻母代號化 (精確碼)
    - xform/ai/A/
    - xform/ei/I/
    - xform/ao/O/
    - xform/ou/U/
    - xform/ang/K/
    - xform/eng/G/
    - xform/an/M/
    - xform/en/N/
    - xform/er/R/
    - xform/eh/E/
    - xform/([iv])e/$1E/

    # === 派生模糊碼 (用於 T9 直接輸入) ===
    # 韻母/介母 → 數字
    - derive/a/1/
    - derive/A/2/
    - derive/[MR]/3/
    - derive/o/4/
    - derive/I/5/
    - derive/[Ni]/6/
    - derive/e/7/
    - derive/[OU]/8/
    - derive/[Ku]/9/
    - derive/E/0/
    - derive/[Gv]/v/

    # 聲母 → 數字
    - derive/^b/1/
    - derive/^d/1/
    - derive/^g/2/
    - derive/^j/2/
    - derive/^Z/3/
    - derive/^z/3/
    - derive/^p/4/
    - derive/^t/4/
    - derive/^k/5/
    - derive/^q/5/
    - derive/^C/6/
    - derive/^c/6/
    - derive/^m/7/
    - derive/^n/7/
    - derive/^h/8/
    - derive/^x/8/
    - derive/^S/9/
    - derive/^s/9/
    - derive/^f/0/
    - derive/^l/0/
    - derive/^r/v/

    # 聲調字母
    - xform/W/w/
    - xform/Y/y/
    - xform/Q/q/
    - xform/P/p/
    - xform/X$/e/

    # 允許省略聲調
    - derive/[wyqpe]$//

    # 簡拼
    - derive/^(.).+$/$1/
    - derive/^(.).+([wyqp])$/$1$2/

translator:
  dictionary: terra_pinyin
  prism: bopomofo_t9_custom
  preedit_format:
    # 0. 處理一聲精確調鍵 e
    - xform/(.)e$/$1ˉ/

    # 1. 處理聲母精確鍵 (包括原本與聲調衝突的 p, q)
    - xform/^p/ㄆ/
    - xform/ p/ ㄆ/
    - xform/'p/'ㄆ/
    - xform/p/˙/
    - xform/^q/ㄑ/
    - xform/ q/ ㄑ/
    - xform/'q/'ㄑ/
    - xform/q/ˋ/

    - xform/b/ㄅ/
    - xform/d/ㄉ/
    - xform/g/ㄍ/
    - xform/j/ㄐ/
    - xform/Z/ㄓ/
    - xform/z/ㄗ/
    - xform/t/ㄊ/
    - xform/k/ㄎ/
    - xform/C/ㄔ/
    - xform/c/ㄘ/
    - xform/m/ㄇ/
    - xform/n/ㄋ/
    - xform/h/ㄏ/
    - xform/x/ㄒ/
    - xform/S/ㄕ/
    - xform/s/ㄙ/
    - xform/f/ㄈ/
    - xform/l/ㄌ/
    - xform/r/ㄖ/

    # 2. 處理介母/韻母精確鍵
    - xform/i/ㄧ/
    - xform/u/ㄨ/
    - xform/v/ㄩ/
    - xform/a/ㄚ/
    - xform/o/ㄛ/
    - xform/e/ㄜ/
    - xform/E/ㄝ/
    - xform/A/ㄞ/
    - xform/I/ㄟ/
    - xform/O/ㄠ/
    - xform/U/ㄡ/
    - xform/M/ㄢ/
    - xform/N/ㄣ/
    - xform/K/ㄤ/
    - xform/G/ㄥ/
    - xform/R/ㄦ/

    # 3. 模糊 T9 鍵
    - xform/1/ㄅ/
    - xform/2/ㄍ/
    - xform/3/ㄓ/
    - xform/4/ㄆ/
    - xform/5/ㄎ/
    - xform/6/ㄔ/
    - xform/7/ㄇ/
    - xform/8/ㄏ/
    - xform/9/ㄕ/
    - xform/0/ㄈ/
    - xform/v/ㄖ/

    # 4. 其他聲調鍵
    - xform/w/ˊ/
    - xform/y/ˇ/

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    abc: "^[a-zA-Z0-9]+$"

predictor:
  db: predict.db
  max_candidates: 5
  max_iterations: 1

simplifier:
  opencc_config: s2t.json  # 簡體聯想詞自動轉換為繁體