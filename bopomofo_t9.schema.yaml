schema:
  schema_id: bopomofo_t9
  name: 注音九宮格
  version: "10.1"

engine:
  processors:
    - ascii_composer
    - speller
    - recognizer
    - key_binder
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    #- lua_filter@t9_sort_filter
    - uniquifier

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz1234567890ABCDEIJKLMNOPSRVXZ"
  initials: "abcdefghijklmnopqrstuvwxyz1234567890ABCDEIJKLMNOPSRVXZ"
  use_space: false
  delimiter: " '"
  algebra:
    - xform/^r5$/er5/
    # 1. 先搬移可能衝突的字母 (ㄑ->A, ㄒ->B)
    - xform/q/A/
    - xform/x/B/
    
    # 2. 基本注音轉換 (🌟 修復組合鼻音韻母)
    - xform/yong/vP/    # ㄩㄥ (用)
    - xform/iong/vP/    # ㄩㄥ (窘)
    - xform/weng/uP/    # ㄨㄥ (翁)
    - xform/ong/uP/     # ㄨㄥ (東)
    - xform/ing/iP/     # ㄧㄥ (英)
    - xform/^yu/v/
    - xform/^yi?/i/
    - xform/^wu?/u/
    - xform/iu/iou/
    - xform/ui/uei/
    - xform/^([jAB])u/$1v/
    - xform/([iuv])n/$1en/
    - xform/^zhi?/Z/
    - xform/^chi?/C/
    - xform/^shi?/S/
    - xform/^([zcsr])i/$1/
    - xform/ai/I/
    - xform/ei/J/
    - xform/ao/K/
    - xform/ou/L/
    - xform/ang/O/
    - xform/eng/P/
    - xform/an/M/
    - xform/en/N/
    - xform/er/R/
    - xform/eh/E/
    - xform/([iv])e/$1E/
    
    # 3. 聲調轉換 (放在最後，確保不會被前面的 xform 誤傷)
    - xform/1$/q/
    - xform/2$/w/
    - xform/3$/x/
    - xform/4$/y/
    
    # 4. T9 模糊鍵映射
    - derive/a/1/
    - derive/I/2/
    - derive/[MR]/3/
    - derive/o/4/
    - derive/J/5/
    - derive/[Ni]/6/
    - derive/e/7/
    - derive/[KL]/8/
    - derive/[Ou]/9/
    - derive/E/0/
    - derive/[Pv]/v/
    - derive/^b/1/
    - derive/^d/1/
    - derive/^g/2/
    - derive/^j/2/
    - derive/^Z/3/
    - derive/^z/3/
    - derive/^p/4/
    - derive/^t/4/
    - derive/^k/5/
    - derive/^A/5/
    - derive/^C/6/
    - derive/^c/6/
    - derive/^m/7/
    - derive/^n/7/
    - derive/^h/8/
    - derive/^B/8/
    - derive/^S/9/
    - derive/^s/9/
    - derive/^f/0/
    - derive/^l/0/
    - derive/^r/v/
    
    # 5. 結尾處理
    - derive/[qwxy]$//
    - abbrev/^(.).+$/$1/

translator:
  dictionary: terra_pinyin
  prism: bopomofo_t9_custom
  enable_user_dict: true
  enable_sentence: true
  enable_encoder: true
  encode_commit_history: true
  max_phrase_length: 7
  preedit_format:
    # 先轉換所有符號
    - xform/A/ㄑ/
    - xform/B/ㄒ/
    - xform/Z/ㄓ/
    - xform/C/ㄔ/
    - xform/S/ㄕ/
    - xform/E/ㄝ/
    - xform/I/ㄞ/
    - xform/J/ㄟ/
    - xform/K/ㄠ/
    - xform/L/ㄡ/
    - xform/M/ㄢ/
    - xform/N/ㄣ/
    - xform/O/ㄤ/
    - xform/P/ㄥ/
    - xform/R/ㄦ/
    - xform/b/ㄅ/
    - xform/p/ㄆ/
    - xform/m/ㄇ/
    - xform/f/ㄈ/
    - xform/d/ㄉ/
    - xform/t/ㄊ/
    - xform/n/ㄋ/
    - xform/l/ㄌ/
    - xform/g/ㄍ/
    - xform/k/ㄎ/
    - xform/h/ㄏ/
    - xform/j/ㄐ/
    - xform/z/ㄗ/
    - xform/c/ㄘ/
    - xform/s/ㄙ/
    - xform/r/ㄖ/
    - xform/i/ㄧ/
    - xform/u/ㄨ/
    - xform/v/ㄩ/
    - xform/a/ㄚ/
    - xform/o/ㄛ/
    - xform/e/ㄜ/
    # 最後轉換聲調 (直接匹配末尾)
    - xform/q$/ˉ/
    - xform/w$/ˊ/
    - xform/x$/ˇ/
    - xform/y$/ˋ/
    # 數字回顯
    - xform/1/ㄅ/
    - xform/2/ㄍ/
    - xform/3/ㄓ/
    - xform/4/ㄆ/
    - xform/5/ㄎ/
    - xform/6/ㄔ/
    - xform/7/ㄇ/
    - xform/8/ㄏ/
    - xform/9/ㄕ/
    - xform/0/ㄈ/
    - xform/v/ㄖ/

key_binder:
  import_preset: default
  bindings:
    - { when: composing, accept: Return, send: Shift+Return }

recognizer:
  import_preset: default
  patterns:
    abc: "^[a-zA-Z0-9]+$"
